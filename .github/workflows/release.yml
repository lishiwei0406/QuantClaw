name: Release

# Triggered by pushing a version tag: git tag v0.3.0 && git push --tags
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read    # default: least privilege; release job elevates below

jobs:
  # ── Binary build ─────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm   # Native ARM runner (public repos only)
                                       # Replace with ubuntu-latest + cross-compile
                                       # if using a private repo.

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Free disk space
      run: |
        sudo rm -rf /usr/local/.ghcup /usr/share/dotnet /usr/local/lib/android \
                    /opt/ghc /opt/hostedtoolcache/CodeQL
        df -h

    - name: Set up ccache
      uses: hendrikmuhs/ccache-action@v1.2.21
      with:
        key: release-linux-${{ matrix.arch }}
        max-size: 500M

    - name: Install C++ dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          cmake ninja-build \
          libspdlog-dev nlohmann-json3-dev \
          libcurl4-openssl-dev libssl-dev \
          gcc g++

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 20

    - name: Build C++ binary
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_STANDARD=17 \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DBUILD_TESTS=OFF
        cmake --build build --parallel
        strip build/quantclaw

    - name: Build Node.js sidecar
      working-directory: sidecar
      run: |
        npm ci
        npm run build
        npm prune --omit=dev

    - name: Package tarball
      run: |
        VERSION="${{ github.ref_name }}"
        NAME="quantclaw-${VERSION}-linux-${{ matrix.arch }}"
        STAGE="dist/${NAME}"

        mkdir -p "${STAGE}/bin" "${STAGE}/sidecar"
        cp build/quantclaw "${STAGE}/bin/"
        cp -r sidecar/dist "${STAGE}/sidecar/dist"
        cp -r sidecar/node_modules "${STAGE}/sidecar/node_modules"
        [ -d skills ] && cp -r skills "${STAGE}/skills"
        cp scripts/install.sh "${STAGE}/install.sh"
        chmod +x "${STAGE}/install.sh"
        echo "${VERSION}" > "${STAGE}/VERSION"

        cd dist
        tar -czf "${NAME}.tar.gz" "${NAME}"
        sha256sum "${NAME}.tar.gz" | awk '{print $1}' > "${NAME}.tar.gz.sha256"
        echo "Packaged $(du -sh "${NAME}.tar.gz" | cut -f1)"

    - name: Upload tarball
      uses: actions/upload-artifact@v7
      with:
        name: quantclaw-linux-${{ matrix.arch }}
        path: |
          dist/quantclaw-*.tar.gz
          dist/quantclaw-*.tar.gz.sha256

  # ── Publish GitHub Release ────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v8
      with:
        merge-multiple: true

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: "QuantClaw ${{ github.ref_name }}"
        generate_release_notes: true
        files: |
          quantclaw-*.tar.gz
          quantclaw-*.tar.gz.sha256

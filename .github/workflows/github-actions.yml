name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'release-*'
      - 'feature-*'
      - 'fix/*'
  pull_request:
    branches: "*"

permissions:
  contents: read

jobs:
  build-test-linux:
    name: Build & Test Linux (${{ matrix.compiler }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            cc: gcc-11
            cxx: g++-11
          - compiler: clang
            cc: clang-14
            cxx: clang++-14

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Free disk space
      run: |
        sudo rm -rf /usr/local/.ghcup /usr/share/dotnet /usr/local/lib/android \
                    /opt/ghc /opt/hostedtoolcache/CodeQL
        df -h

    - name: Set up ccache
      uses: hendrikmuhs/ccache-action@v1.2.13
      with:
        key: ${{ github.job }}-${{ matrix.compiler }}
        max-size: 500M

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          cmake \
          ninja-build \
          libspdlog-dev \
          nlohmann-json3-dev \
          libcurl4-openssl-dev \
          libssl-dev \
          ${{ matrix.cc }} \
          ${{ matrix.cxx }}

    - name: Configure CMake
      env:
        CC: ${{ matrix.cc }}
        CXX: ${{ matrix.cxx }}
      run: |
        cmake -B build \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_STANDARD=17 \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache

    - name: Build
      run: cmake --build build --parallel

    - name: Run Tests
      working-directory: build
      run: ctest --output-on-failure --parallel

    - name: Upload test results
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: test-results-linux-${{ matrix.compiler }}
        path: build/Testing/

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: scripts/Dockerfile
        push: false
        tags: quantclaw:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test Docker image
      run: |
        docker run --rm quantclaw:test quantclaw --version || true

  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          clang-14 clang-tidy-14 \
          cmake ninja-build \
          libspdlog-dev nlohmann-json3-dev \
          libcurl4-openssl-dev libssl-dev

    - name: Generate compile_commands.json
      env:
        CC: clang-14
        CXX: clang++-14
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_CXX_STANDARD=17 \
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
        # Ensure headers are generated (if any)
        cmake --build build --parallel --target quantclaw 2>/dev/null || true

    - name: Run clang-tidy
      run: |
        find src -name '*.cpp' -not -path '*/ui/*' -print0 \
          | xargs -0 -P$(nproc) clang-tidy-14 \
              -p build \
              --config-file=.clang-tidy \
              2>&1 | tee /tmp/clang-tidy.log
        # Filter out third-party dependency diagnostics before checking for errors.
        grep -v '_deps/' /tmp/clang-tidy.log > /tmp/clang-tidy-filtered.log || true
        if grep -q 'error:' /tmp/clang-tidy-filtered.log; then
          echo "clang-tidy found errors — see log above"
          exit 1
        fi

    - name: Upload clang-tidy log
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: clang-tidy-log
        path: /tmp/clang-tidy.log

  format-check:
    name: Code Format Check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install clang-format
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-format-14

    - name: Check C++ formatting
      continue-on-error: true
      run: |
        echo "Checking code formatting..."
        FAILED_FILES=""

        for file in $(find src include tests \( -name "*.cpp" -o -name "*.hpp" \) -not -path "*/ui/*"); do
          if ! clang-format-14 --dry-run --Werror "$file" 2>&1 > /dev/null; then
            FAILED_FILES="$FAILED_FILES\n  - $file"
          fi
        done

        if [ -n "$FAILED_FILES" ]; then
          echo "Warning: The following files have formatting issues:"
          echo -e "$FAILED_FILES"
          echo ""
          echo "To fix: ./scripts/format-code.sh"
          exit 1
        fi

        echo "All files are properly formatted."

  smoke-test:
    name: Smoke Test (Integration)
    runs-on: ubuntu-latest
    needs: [build-test-linux]
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake ninja-build \
          libspdlog-dev nlohmann-json3-dev \
          libcurl4-openssl-dev libssl-dev \
          gcc-11 g++-11 curl jq

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install ws dependency
      run: cd scripts/smoke-tests && npm install

    - name: Build
      env:
        CC: gcc-11
        CXX: g++-11
      run: |
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_STANDARD=17
        cmake --build build --parallel

    - name: Run smoke tests
      run: bash tests/smoke_test.sh

    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: smoke-test-logs
        path: /tmp/quantclaw-smoke-ci/

  onboard-test:
    name: Onboard Integration Test
    runs-on: ubuntu-latest
    needs: [build-test-linux]
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          cmake ninja-build \
          libspdlog-dev nlohmann-json3-dev \
          libcurl4-openssl-dev libssl-dev \
          gcc-11 g++-11 \
          python3

    - name: Build (quantclaw binary only)
      env:
        CC: gcc-11
        CXX: g++-11
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_STANDARD=17 \
          -DBUILD_TESTS=OFF
        cmake --build build --parallel --target quantclaw

    - name: Run onboard integration tests
      run: bash tests/test-onboard.sh build/quantclaw

    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: onboard-test-logs
        path: /tmp/quantclaw-onboard-*/

  cli-test:
    name: CLI Integration Test
    runs-on: ubuntu-latest
    needs: [build-test-linux]
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          cmake ninja-build \
          libspdlog-dev nlohmann-json3-dev \
          libcurl4-openssl-dev libssl-dev \
          gcc-11 g++-11 \
          curl python3

    - name: Build (quantclaw binary only)
      env:
        CC: gcc-11
        CXX: g++-11
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_STANDARD=17 \
          -DBUILD_TESTS=OFF
        cmake --build build --parallel --target quantclaw

    - name: Run CLI integration tests
      run: bash tests/test-cli.sh build/quantclaw

    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: cli-test-logs
        path: /tmp/quantclaw-cli-*/

  static-analysis:
    name: Static Analysis (cppcheck)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install cppcheck
      run: |
        sudo apt-get update
        sudo apt-get install -y cppcheck

    - name: Run cppcheck
      run: |
        cppcheck --enable=warning,performance,portability \
          --suppress=missingIncludeSystem \
          --inline-suppr \
          --error-exitcode=0 \
          -I include \
          --suppress='*:ui/*' \
          -i ui \
          src/

  sanitizers:
    name: Sanitizers (${{ matrix.sanitizer }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - sanitizer: asan
            cmake_flag: -DENABLE_ASAN=ON
            env_vars: ASAN_OPTIONS=detect_leaks=1:halt_on_error=1
          - sanitizer: tsan
            cmake_flag: -DENABLE_TSAN=ON
            env_vars: TSAN_OPTIONS=halt_on_error=1
          - sanitizer: ubsan
            cmake_flag: -DENABLE_UBSAN=ON
            env_vars: UBSAN_OPTIONS=halt_on_error=1:print_stacktrace=1

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up ccache
      uses: hendrikmuhs/ccache-action@v1.2.13
      with:
        key: ${{ github.job }}-${{ matrix.sanitizer }}
        max-size: 300M

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          cmake ninja-build clang-14 libclang-rt-14-dev \
          libspdlog-dev nlohmann-json3-dev \
          libcurl4-openssl-dev libssl-dev

    - name: Configure (${{ matrix.sanitizer }})
      env:
        CC: clang-14
        CXX: clang++-14
      run: |
        cmake -B build \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=Debug \
          -DBUILD_TESTS=ON \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          ${{ matrix.cmake_flag }}

    - name: Build
      run: cmake --build build --parallel

    - name: Run tests
      working-directory: build
      env:
        # Inject sanitizer runtime options via the matrix variable.
        # Each matrix entry sets exactly one XSAN_OPTIONS variable.
        ASAN_OPTIONS: ${{ matrix.sanitizer == 'asan' && 'detect_leaks=1:halt_on_error=1' || '' }}
        TSAN_OPTIONS: ${{ matrix.sanitizer == 'tsan' && 'halt_on_error=1' || '' }}
        UBSAN_OPTIONS: ${{ matrix.sanitizer == 'ubsan' && 'halt_on_error=1:print_stacktrace=1' || '' }}
      run: ctest --output-on-failure --parallel

    - name: Upload results on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: sanitizer-${{ matrix.sanitizer }}-results
        path: build/Testing/

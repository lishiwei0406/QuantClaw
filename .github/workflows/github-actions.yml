name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'release-*'
      - 'feature-*'
      - 'fix/*'
  pull_request:
    branches: "*"

permissions:
  contents: read

jobs:
  build-test-linux:
    name: Build & Test Linux (${{ matrix.compiler }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            cc: gcc-11
            cxx: g++-11
          - compiler: clang
            cc: clang-14
            cxx: clang++-14

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          ninja-build \
          libspdlog-dev \
          nlohmann-json3-dev \
          libcurl4-openssl-dev \
          libssl-dev \
          ${{ matrix.cc }} \
          ${{ matrix.cxx }}

    - name: Configure CMake
      env:
        CC: ${{ matrix.cc }}
        CXX: ${{ matrix.cxx }}
      run: |
        cmake -B build \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_STANDARD=17

    - name: Build
      run: cmake --build build --parallel

    - name: Run Tests
      working-directory: build
      run: ctest --output-on-failure --parallel

    - name: Upload test results
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: test-results-linux-${{ matrix.compiler }}
        path: build/Testing/

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: scripts/Dockerfile
        push: false
        tags: quantclaw:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test Docker image
      run: |
        docker run --rm quantclaw:test quantclaw --version || true

  format-check:
    name: Code Format Check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install clang-format
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-format-14

    - name: Check C++ formatting
      continue-on-error: true
      run: |
        echo "Checking code formatting..."
        FAILED_FILES=""

        for file in $(find src include tests -not -path "*/ui/*" -name "*.cpp" -o -name "*.hpp"); do
          if ! clang-format-14 --dry-run --Werror "$file" 2>&1 > /dev/null; then
            FAILED_FILES="$FAILED_FILES\n  - $file"
          fi
        done

        if [ -n "$FAILED_FILES" ]; then
          echo "Warning: The following files have formatting issues:"
          echo -e "$FAILED_FILES"
          echo ""
          echo "To fix: ./scripts/format-code.sh"
          exit 1
        fi

        echo "All files are properly formatted."

  smoke-test:
    name: Smoke Test (Integration)
    runs-on: ubuntu-latest
    needs: [build-test-linux]
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake ninja-build \
          libspdlog-dev nlohmann-json3-dev \
          libcurl4-openssl-dev libssl-dev \
          gcc-11 g++-11 curl jq

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install ws dependency
      run: cd scripts/smoke-tests && npm install

    - name: Build
      env:
        CC: gcc-11
        CXX: g++-11
      run: |
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_STANDARD=17
        cmake --build build --parallel

    - name: Run smoke tests
      run: bash tests/smoke_test.sh

    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: smoke-test-logs
        path: /tmp/quantclaw-smoke-ci/

  static-analysis:
    name: Static Analysis (cppcheck)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install cppcheck
      run: |
        sudo apt-get update
        sudo apt-get install -y cppcheck

    - name: Run cppcheck
      run: |
        cppcheck --enable=warning,performance,portability \
          --suppress=missingIncludeSystem \
          --inline-suppr \
          --error-exitcode=0 \
          -I include \
          --suppress='*:ui/*' \
          -i ui \
          src/

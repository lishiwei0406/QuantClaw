name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'release-*'
      - 'feature-*'
      - 'fix/*'
  pull_request:
    branches: "*"

permissions:
  contents: read

jobs:
  build-test-linux:
    name: Build & Test Linux (${{ matrix.compiler }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            cc: gcc-11
            cxx: g++-11
          - compiler: clang
            cc: clang-14
            cxx: clang++-14

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Free disk space
      run: |
        sudo rm -rf /usr/local/.ghcup /usr/share/dotnet /usr/local/lib/android \
                    /opt/ghc /opt/hostedtoolcache/CodeQL
        df -h

    - name: Set up ccache
      uses: hendrikmuhs/ccache-action@v1.2.13
      with:
        key: ${{ github.job }}-${{ matrix.compiler }}
        max-size: 500M

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          cmake \
          ninja-build \
          libspdlog-dev \
          nlohmann-json3-dev \
          libcurl4-openssl-dev \
          libssl-dev \
          ${{ matrix.cc }} \
          ${{ matrix.cxx }}

    - name: Configure CMake
      env:
        CC: ${{ matrix.cc }}
        CXX: ${{ matrix.cxx }}
      run: |
        cmake -B build \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_STANDARD=17 \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache

    - name: Build
      run: cmake --build build --parallel

    - name: Run Tests
      working-directory: build
      run: ctest --output-on-failure --parallel --timeout 120

    - name: Upload test results
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: test-results-linux-${{ matrix.compiler }}
        path: build/Testing/

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: scripts/Dockerfile
        push: false
        tags: quantclaw:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test Docker image
      run: |
        docker run --rm quantclaw:test quantclaw --version || true

  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          clang-14 clang-tidy-14 \
          cmake ninja-build \
          libspdlog-dev nlohmann-json3-dev \
          libcurl4-openssl-dev libssl-dev

    - name: Generate compile_commands.json
      env:
        CC: clang-14
        CXX: clang++-14
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_CXX_STANDARD=17 \
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
        # Ensure headers are generated (if any)
        cmake --build build --parallel --target quantclaw 2>/dev/null || true

    - name: Run clang-tidy
      run: |
        find src -name '*.cpp' -not -path '*/ui/*' -print0 \
          | xargs -0 -P$(nproc) clang-tidy-14 \
              -p build \
              --config-file=.clang-tidy \
              2>&1 | tee /tmp/clang-tidy.log
        # Filter out third-party dependency diagnostics before checking for errors.
        grep -v '_deps/' /tmp/clang-tidy.log > /tmp/clang-tidy-filtered.log || true
        if grep -q 'error:' /tmp/clang-tidy-filtered.log; then
          echo "clang-tidy found errors — see log above"
          exit 1
        fi

    - name: Upload clang-tidy log
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: clang-tidy-log
        path: /tmp/clang-tidy.log

  format-check:
    name: Code Format Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install clang-format-18
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-format-18

    - name: Check C++ formatting
      run: |
        echo "Checking code formatting with clang-format-18..."
        FAILED_FILES=""

        while IFS= read -r -d '' file; do
          if ! clang-format-18 --dry-run --Werror "$file" > /dev/null 2>&1; then
            FAILED_FILES="$FAILED_FILES\n  - $file"
          fi
        done < <(find src include tests \( -name "*.cpp" -o -name "*.hpp" \) -print0)

        if [ -n "$FAILED_FILES" ]; then
          echo "The following files are not formatted correctly:"
          printf '%b\n' "$FAILED_FILES"
          echo ""
          echo "Run scripts/format-code.sh to fix."
          exit 1
        fi

        echo "All files are properly formatted."

  smoke-test:
    name: Smoke Test (Integration)
    runs-on: ubuntu-latest
    needs: [build-test-linux]
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake ninja-build \
          libspdlog-dev nlohmann-json3-dev \
          libcurl4-openssl-dev libssl-dev \
          gcc-11 g++-11 curl jq

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 22

    - name: Install ws dependency
      run: cd scripts/smoke-tests && npm install

    - name: Build
      env:
        CC: gcc-11
        CXX: g++-11
      run: |
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_STANDARD=17
        cmake --build build --parallel

    - name: Run smoke tests
      run: bash tests/smoke_test.sh

    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: smoke-test-logs
        path: /tmp/quantclaw-smoke-ci/

  onboard-test:
    name: Onboard Integration Test
    runs-on: ubuntu-latest
    needs: [build-test-linux]
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          cmake ninja-build \
          libspdlog-dev nlohmann-json3-dev \
          libcurl4-openssl-dev libssl-dev \
          gcc-11 g++-11 \
          python3

    - name: Build (quantclaw binary only)
      env:
        CC: gcc-11
        CXX: g++-11
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_STANDARD=17 \
          -DBUILD_TESTS=OFF
        cmake --build build --parallel --target quantclaw

    - name: Run onboard integration tests
      run: bash tests/test-onboard.sh build/quantclaw

    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: onboard-test-logs
        path: /tmp/quantclaw-onboard-*/

  cli-test:
    name: CLI Integration Test
    runs-on: ubuntu-latest
    needs: [build-test-linux]
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          cmake ninja-build \
          libspdlog-dev nlohmann-json3-dev \
          libcurl4-openssl-dev libssl-dev \
          gcc-11 g++-11 \
          curl python3

    - name: Build (quantclaw binary only)
      env:
        CC: gcc-11
        CXX: g++-11
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_STANDARD=17 \
          -DBUILD_TESTS=OFF
        cmake --build build --parallel --target quantclaw

    - name: Run CLI integration tests
      run: bash tests/test-cli.sh build/quantclaw

    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: cli-test-logs
        path: /tmp/quantclaw-cli-*/

  static-analysis:
    name: Static Analysis (cppcheck)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install cppcheck
      run: |
        sudo apt-get update
        sudo apt-get install -y cppcheck

    - name: Run cppcheck
      run: |
        cppcheck --enable=warning,performance,portability \
          --suppress=missingIncludeSystem \
          --inline-suppr \
          --error-exitcode=0 \
          -I include \
          --suppress='*:ui/*' \
          -i ui \
          src/

  sanitizers:
    name: Sanitizers (${{ matrix.sanitizer }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - sanitizer: asan
            cmake_flag: -DENABLE_ASAN=ON
            env_vars: ASAN_OPTIONS=detect_leaks=1:halt_on_error=1
          - sanitizer: tsan
            cmake_flag: -DENABLE_TSAN=ON
            env_vars: TSAN_OPTIONS=halt_on_error=1
          - sanitizer: ubsan
            cmake_flag: -DENABLE_UBSAN=ON
            env_vars: UBSAN_OPTIONS=halt_on_error=1:print_stacktrace=1

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up ccache
      uses: hendrikmuhs/ccache-action@v1.2.13
      with:
        key: ${{ github.job }}-${{ matrix.sanitizer }}
        max-size: 300M

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          cmake ninja-build clang-14 libclang-rt-14-dev \
          libspdlog-dev nlohmann-json3-dev \
          libcurl4-openssl-dev libssl-dev

    - name: Configure (${{ matrix.sanitizer }})
      env:
        CC: clang-14
        CXX: clang++-14
      run: |
        cmake -B build \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=Debug \
          -DBUILD_TESTS=ON \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          ${{ matrix.cmake_flag }}

    - name: Build
      run: cmake --build build --parallel

    - name: Run tests
      working-directory: build
      env:
        # Inject sanitizer runtime options via the matrix variable.
        # Each matrix entry sets exactly one XSAN_OPTIONS variable.
        ASAN_OPTIONS: ${{ matrix.sanitizer == 'asan' && 'detect_leaks=1:halt_on_error=1' || '' }}
        TSAN_OPTIONS: ${{ matrix.sanitizer == 'tsan' && 'halt_on_error=1' || '' }}
        UBSAN_OPTIONS: ${{ matrix.sanitizer == 'ubsan' && 'halt_on_error=1:print_stacktrace=1' || '' }}
      # Sanitizers add 5-20x overhead; integration tests (WebSocket + RPC)
      # need more time to avoid flaky timeouts. --repeat until-pass:2 retries
      # a single flaky timeout once before reporting failure.
      run: ctest --output-on-failure --parallel --timeout 300 --repeat until-pass:2

    - name: Upload results on failure
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: sanitizer-${{ matrix.sanitizer }}-results
        path: build/Testing/

  build-test-windows:
    name: Build & Test Windows (MSVC)
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
      # Direct vcpkg binary cache to a workspace-local dir so actions/cache
      # can persist it across runs (avoids re-compiling all vcpkg packages).
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg-bincache,readwrite"
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Restore vcpkg binary cache from resources repo (L1)
      # Try to download pre-built packages from QuantClaw/resources release.
      # This is the fastest path: no compilation at all.
      # Falls back gracefully if the release does not exist yet.
      run: |
        $baseline = (Get-Content vcpkg.json | ConvertFrom-Json).'builtin-baseline'
        $short = $baseline.Substring(0, 8)
        $tag = "vcpkg-windows-x64-$short"
        $asset = "vcpkg-bincache-windows-x64.tar.gz"
        $url = "https://github.com/QuantClaw/resources/releases/download/$tag/$asset"
        Write-Host "Trying to download pre-built cache from: $url"
        try {
          Invoke-WebRequest -Uri $url -OutFile $asset -ErrorAction Stop
          New-Item -ItemType Directory -Force -Path vcpkg-bincache | Out-Null
          tar -xzf $asset
          Write-Host "Pre-built vcpkg cache restored from QuantClaw/resources."
          echo "VCPKG_CACHE_HIT=1" >> $env:GITHUB_ENV
        } catch {
          Write-Host "Pre-built cache not available ($($_.Exception.Message)), will compile from source."
        }

    - name: Cache vcpkg binary packages (L2 fallback)
      # Used only when the resources release is unavailable (e.g. first build
      # after a baseline bump).  Persists the freshly-compiled packages so that
      # the next run hits L1 once the resources workflow publishes the release.
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/vcpkg-bincache
        # Bust the cache when manifest dependencies change.
        key: vcpkg-x64-windows-${{ hashFiles('vcpkg.json') }}
        restore-keys: vcpkg-x64-windows-

    - name: Update and bootstrap vcpkg
      run: |
        $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
        $baseline = (Get-Content vcpkg.json | ConvertFrom-Json).'builtin-baseline'

        git -C "$vcpkgRoot" fetch --unshallow origin
        if ($LASTEXITCODE -ne 0) {
          git -C "$vcpkgRoot" fetch origin
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to fetch vcpkg repository history."
          }
        }

        git -C "$vcpkgRoot" cat-file -e "$baseline`^{commit}" 2>$null
        if ($LASTEXITCODE -ne 0) {
          git -C "$vcpkgRoot" fetch origin "$baseline"
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to fetch vcpkg baseline commit $baseline."
          }
        }

        git -C "$vcpkgRoot" checkout origin/master
        & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics

    - name: Configure CMake
      run: |
        cmake -B build `
          -A x64 `
          -DCMAKE_CXX_STANDARD=17 `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
          -DVCPKG_TARGET_TRIPLET=x64-windows

    - name: Build
      run: cmake --build build --config Release --parallel

    - name: Add vcpkg DLLs to PATH
      # Prepend vcpkg DLL dir to the runner's PATH so both the test binary
      # and any child processes it spawns (e.g. cmd.exe, ping) can find
      # system tools alongside vcpkg DLLs.
      run: |
        $vcpkgBin = Join-Path $env:GITHUB_WORKSPACE "build\vcpkg_installed\x64-windows\bin"
        echo $vcpkgBin >> $env:GITHUB_PATH

    - name: Run Tests
      working-directory: build
      run: ctest --output-on-failure --parallel -C Release --timeout 120

    - name: Upload test results
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: test-results-windows-msvc
        path: build/Testing/

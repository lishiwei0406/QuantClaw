name: "❓ Question"
description: "Ask a question about QuantClaw"
title: "[QUESTION] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🤔 Question

        We're happy to help answer your questions about QuantClaw!

  - type: checkboxes
    id: verification
    attributes:
      label: "✅ Verification Checklist"
      description: "Please verify that you've completed the following:"
      options:
        - label: "🔍 I have searched the existing issues and confirmed this is not a duplicate"
          required: true
        - label: "📖 I have checked the documentation and README"
          required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## 🔧 Environment (Optional)

  - type: input
    id: quantclaw-version
    attributes:
      label: "QuantClaw Version"
      description: "Version of QuantClaw you're using"
      placeholder: "e.g., v0.2.0"
    validations:
      required: false

  - type: input
    id: component
    attributes:
      label: "Related Component"
      description: "Which component is your question about?"
      placeholder: "e.g., Gateway, Agent Loop, LLM Provider, Channel Adapter"
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: "Operating System"
      description: "Your operating system"
      placeholder: "e.g., Ubuntu 22.04, macOS 14.0, Windows 11"
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---
        ## ❓ Question Details

  - type: textarea
    id: question
    attributes:
      label: "💬 Your Question"
      description: "Please describe your question in detail"
      placeholder: |
        Please describe your question in detail, including:
        • What specifically would you like to know?
        • What confusion have you encountered?
        • What kind of help are you expecting?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: "📚 Background Information"
      description: "Add any context that might help us answer your question"
      placeholder: |
        Provide relevant background information:
        • What are you trying to achieve?
        • What have you already tried?
        • What documentation have you consulted?
    validations:
      required: false

  - type: textarea
    id: related-resources
    attributes:
      label: "🔗 Related Resources"
      description: "Link to any related documents, code, or resources"
      placeholder: |
        Share related links or resources:
        • Relevant documentation links
        • Code repositories or snippets
        • Configuration files (with sensitive data removed)
    validations:
      required: false

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Claw/Crab inspired logo for QuantClaw -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#grad1)" stroke-width="2" opacity="0.3"/>

  <!-- Main body -->
  <ellipse cx="100" cy="110" rx="45" ry="50" fill="url(#grad1)"/>

  <!-- Left claw -->
  <path d="M 60 90 Q 40 70 35 50" stroke="url(#grad1)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <circle cx="35" cy="45" r="6" fill="url(#grad1)"/>

  <!-- Right claw -->
  <path d="M 140 90 Q 160 70 165 50" stroke="url(#grad1)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <circle cx="165" cy="45" r="6" fill="url(#grad1)"/>

  <!-- Left leg -->
  <path d="M 70 155 Q 60 170 65 185" stroke="url(#grad1)" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Right leg -->
  <path d="M 130 155 Q 140 170 135 185" stroke="url(#grad1)" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Eyes -->
  <circle cx="85" cy="95" r="5" fill="#ffffff"/>
  <circle cx="115" cy="95" r="5" fill="#ffffff"/>
  <circle cx="84" cy="96" r="2.5" fill="#0891b2"/>
  <circle cx="114" cy="96" r="2.5" fill="#0891b2"/>
</svg>
